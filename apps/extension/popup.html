<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10xConnect</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        width: 300px;
        margin: 0;
        padding: 16px;
        color: #0f172a;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
      }
      p {
        margin: 6px 0;
        font-size: 12.5px;
        line-height: 1.45;
      }
      .muted {
        color: #64748b;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-weight: 600;
        font-size: 12.5px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: #cbd5e1;
      }
      .dot.ok {
        background: #16a34a;
      }
      .dot.bad {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>10xConnect</h1>
    <p class="status"><span id="dot" class="dot"></span><span id="status">Checking LinkedIn…</span></p>
    <p class="muted">
      Open 10xConnect → Settings → Accounts and click <b>Connect with extension</b>. We use your
      real, signed-in LinkedIn session — no password, and no third-party account to set up.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
